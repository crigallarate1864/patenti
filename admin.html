<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRI Admin Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; color: #0f172a; font-size: 18px; }
        .tab-btn { background: #f1f5f9; color: #64748b; border: 2px solid #e2e8f0; transition: all 0.3s; }
        .tab-btn.tab-active { background: #ed1c24 !important; color: white !important; border-color: #ed1c24 !important; box-shadow: 0 10px 15px -3px rgba(237, 28, 36, 0.4); }
        .hidden { display: none; }
        .card-admin { background: white; border-radius: 2rem; border: 2px solid #e2e8f0; }
        .save-flash { border-color: #22c55e !important; background-color: #f0fdf4 !important; }
        .filter-btn { transition: all 0.2s; border: 2px solid transparent; }
        .filter-active { background: white !important; border-color: #ed1c24 !important; color: #ed1c24 !important; font-weight: 900; }
    </style>
</head>
<body class="pb-20">
    <header class="bg-white border-b-4 border-red-600 sticky top-0 z-50 px-6 py-6 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-8">
                <img src="logo.png" class="h-16 w-auto" onerror="this.style.display='none'">
                <h1 class="text-3xl font-black uppercase tracking-tighter">Pannello <span class="text-red-600 italic">Responsabile</span></h1>
            </div>
            <div class="flex gap-3">
                <button onclick="generaRecapWA()" class="bg-green-600 text-white px-8 py-4 rounded-2xl font-black uppercase text-sm shadow-lg hover:bg-green-700 transition">Recap WhatsApp</button>
                <button onclick="init()" class="w-16 h-16 bg-red-50 text-red-600 rounded-2xl flex items-center justify-center hover:bg-red-600 hover:text-white transition"><i id="sync" class="fas fa-sync-alt text-xl"></i></button>
            </div>
        </div>
    </header>

    <nav class="max-w-7xl mx-auto px-6 py-8 flex gap-4 overflow-x-auto">
        <button onclick="switchTab('guide')" id="t-guide" class="tab-btn tab-active px-10 py-5 rounded-3xl font-black uppercase text-sm">Gestione Guide</button>
        <button onclick="switchTab('registro')" id="t-registro" class="tab-btn px-10 py-5 rounded-3xl font-black uppercase text-sm">Registro Trainer</button>
        <button onclick="switchTab('staff')" id="t-staff" class="tab-btn px-10 py-5 rounded-3xl font-black uppercase text-sm">Anagrafica</button>
        <button onclick="switchTab('mezzi')" id="t-mezzi" class="tab-btn px-10 py-5 rounded-3xl font-black uppercase text-sm">Gestione Mezzi</button>
    </nav>

    <main class="max-w-7xl mx-auto px-6">
        <div id="sec-guide" class="space-y-8">
            <div class="flex items-center gap-4 mb-4 bg-slate-200 p-1.5 rounded-2xl w-fit">
                <button onclick="filterStatus('APERTA')" id="f-aperta" class="filter-btn filter-active px-8 py-3 rounded-xl uppercase text-sm">In Attesa</button>
                <button onclick="filterStatus('ASSEGNATA')" id="f-assegnata" class="filter-btn px-8 py-3 rounded-xl uppercase text-sm text-slate-500">Confermate</button>
            </div>
            <div id="lista-guide" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </div>

        <div id="sec-registro" class="hidden space-y-6">
            <div id="grid-registro" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>

        <div id="sec-staff" class="hidden space-y-8">
            <div class="bg-white p-10 rounded-[3rem] border shadow-xl">
                <h2 class="text-2xl font-black mb-8 uppercase text-red-600 italic underline">Nuovo Profilo</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">
                    <select id="add-ruolo" class="p-5 bg-slate-50 rounded-2xl border-2 font-bold outline-none"><option value="DISCENTE">DISCENTE</option><option value="TRAINER">TRAINER</option></select>
                    <input type="text" id="add-nome" placeholder="COGNOME NOME" class="p-5 bg-slate-50 rounded-2xl border-2 font-bold uppercase outline-none">
                    <input type="email" id="add-email" placeholder="EMAIL" class="p-5 bg-slate-50 rounded-2xl border-2 font-bold outline-none">
                    <select id="add-cat" class="p-5 bg-slate-50 rounded-2xl border-2 font-bold outline-none"><option value="4">PATENTE 4</option><option value="5">PATENTE 5</option></select>
                    <button onclick="addPersona()" class="bg-red-600 text-white font-black p-5 rounded-2xl uppercase shadow-lg hover:bg-black transition">Aggiungi</button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6" id="grid-staff"></div>
        </div>

        <div id="sec-mezzi" class="hidden space-y-10">
            <div class="bg-white p-10 rounded-[3rem] border shadow-xl max-w-2xl mx-auto text-center">
                <h2 class="text-2xl font-black mb-6 uppercase italic">Aggiungi Mezzo</h2>
                <div class="flex gap-4">
                    <input type="text" id="add-targa" placeholder="TARGA" class="flex-1 p-5 bg-slate-50 rounded-2xl border-2 font-bold uppercase text-center outline-none">
                    <button onclick="addMezzo()" class="bg-slate-900 text-white font-black px-10 rounded-2xl uppercase shadow-md transition">Salva</button>
                </div>
            </div>
            <div id="lista-mezzi" class="flex flex-wrap gap-4 justify-center"></div>
        </div>
    </main>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzTlu8Jg28SAeu5bCBZjkhljTUZrhBj9MXeklZVECrmfpH9S1GheQyFFxpRTQgsW0oz/exec";
        let db = {}; let currentFilter = 'APERTA';

        async function init() {
            document.getElementById('sync').classList.add('fa-spin');
            try { const r = await fetch(API); db = await r.json(); renderAll(); } catch (e) { alert("Errore di caricamento dati."); }
            document.getElementById('sync').classList.remove('fa-spin');
        }

        function fixD(s) { if(!s || s === "Data") return "N.D."; let p = s.split('T')[0].split(/[-/]/); return `${p[0].length===4?p[2]:p[0]}-${p[1]}-${p[0].length===4?p[0]:p[2]}`; }
        
        function isFuture(dateStr, timeStr) {
            const oraRiferimento = timeStr ? timeStr.split(' - ')[0] : "23:59";
            let p = dateStr.split('T')[0].split(/[-/]/);
            const dGuida = new Date(p[0].length===4?p[0]:p[2], p[1]-1, p[0].length===4?p[2]:p[0]);
            const [ore, min] = oraRiferimento.split(':');
            dGuida.setHours(ore, min, 0);
            return dGuida > new Date();
        }

        function generaRecapWA() {
            const aperte = db.richieste.filter(r => r[4] === 'APERTA' && r[3] && r[0] !== "ID" && isFuture(r[1], r[2]));
            const conf = db.richieste.filter(r => r[4] === 'ASSEGNATA' && r[3] && r[0] !== "ID" && isFuture(r[1], r[2]));
            
            let m = "*RECAP GUIDE CRI GALLARATE*\n\n";
            
            if (aperte.length > 0) {
                m += "*RICHIESTE IN ATTESA DI ASSEGNAZIONE*\n";
                const stats = aperte.reduce((acc, r) => { 
                    if (!acc[r[3]]) acc[r[3]] = { count: 0 }; 
                    acc[r[3]].count++; 
                    return acc; 
                }, {});
                for (const allievo in stats) { 
                    m += "L'ALLIEVO *" + allievo.toUpperCase() + "* STA ATTENDENDO L'ASSEGNAZIONE DI *" + stats[allievo].count + "* GUIDA/E\n"; 
                }
                m += "\nCLICCA SUL LINK PER ACCETTARE LA PROPOSTA:\nhttps://crigallarate1864.github.io/patenti/trainer.html\n\n";
            }
            
            if (conf.length > 0) {
                m += "----------------------------------\n";
                m += "*RIEPILOGO GUIDE ASSEGNATE*\n";
                conf.sort((a,b) => a[3].localeCompare(b[3]));
                let ua = "";
                conf.forEach(r => { 
                    if (r[3].toUpperCase() !== ua) { 
                        m += "\n*ALLIEVO: " + r[3].toUpperCase() + "*\n"; 
                        ua = r[3].toUpperCase(); 
                    } 
                    m += "Giorno: " + fixD(r[1]) + " - Ore: " + r[2] + "\n";
                    m += "Istruttore: " + r[5] + "\n";
                    m += "Mezzo: " + (r[6] || 'Da assegnare') + "\n\n"; 
                });
            }
            
            window.open(`https://wa.me/?text=${encodeURIComponent(m)}`, '_blank');
        }

        function renderAll() {
            const listGuide = document.getElementById('lista-guide');
            const filt = db.richieste.filter(r => r[4] === currentFilter && r[3] && r[0] !== "ID" && isFuture(r[1], r[2])).sort((a,b) => new Date(a[1]) - new Date(b[1]));
            
            listGuide.innerHTML = filt.map((r,i) => `
                <div id="card-${i}" class="card-admin p-8 space-y-4">
                    <p class="text-red-600 font-black text-2xl mb-1">${fixD(r[1])}</p>
                    <h4 class="text-2xl font-black uppercase text-slate-800 leading-none tracking-tighter">${r[3]}</h4>
                    <p class="text-lg font-bold text-slate-400 mt-2">Ore ${r[2]} ${r[5] ? ' - ' + r[5] : ''}</p>
                    <select onchange="salvaTarga('${r[0]}', this.value, 'card-${i}')" class="w-full p-4 bg-slate-50 border-2 rounded-2xl font-black text-lg">
                        <option value="">Scegli Mezzo...</option>
                        ${db.veicoli.map(v => `<option value="${v[0]}" ${r[6]===v[0]?'selected':''}>${v[0]}</option>`).join('')}
                    </select>
                </div>`).join('');

            const trainers = db.anagrafica.filter(a => a[0] === 'TRAINER');
            const assegnate = db.richieste.filter(r => r[4] === 'ASSEGNATA');
            document.getElementById('grid-registro').innerHTML = trainers.map(t => {
                const guideT = assegnate.filter(r => r[5] === t[1]);
                let fatte = 0, pren = 0;
                guideT.forEach(r => { if (isFuture(r[1], r[2])) pren++; else fatte++; });
                return `<div class="bg-white p-8 rounded-[2.5rem] shadow-lg border border-slate-100"><h3 class="font-black uppercase text-xl text-slate-800 border-b-4 border-red-500 pb-2 mb-6">${t[1]}</h3><div class="grid grid-cols-2 gap-4"><div class="bg-green-50 p-4 rounded-3xl text-center border border-green-100"><p class="text-3xl font-black text-green-600">${fatte}</p><p class="text-[10px] font-bold uppercase text-slate-400">Guide Fatte</p></div><div class="bg-blue-50 p-4 rounded-3xl text-center border border-blue-100"><p class="text-3xl font-black text-blue-600">${pren}</p><p class="text-[10px] font-bold uppercase text-slate-400">Prenotate</p></div></div></div>`;
            }).join('');

            document.getElementById('grid-staff').innerHTML = db.anagrafica.filter(a => a[0] && a[1] && a[0] !== "RUOLO").map(a => `<div class="bg-white p-6 rounded-3xl border flex justify-between items-center shadow-sm"><div><p class="text-[9px] font-black uppercase tracking-widest ${a[0]==='TRAINER'?'text-green-600':'text-blue-600'}">${a[0]}</p><h5 class="text-xl font-black uppercase text-slate-800">${a[1]}</h5><p class="text-xs font-bold text-slate-400 italic">Patente ${a[3] || '---'}</p></div><button onclick="delPersona('${a[1]}')" class="text-slate-200 hover:text-red-600 text-2xl transition"><i class="fas fa-user-minus"></i></button></div>`).join('');
            document.getElementById('lista-mezzi').innerHTML = db.veicoli.map(v => `<div class="bg-white border-4 px-8 py-4 rounded-3xl font-black text-2xl uppercase shadow-md">${v[0]}</div>`).join('');
        }

        async function salvaTarga(id, val, cardId) {
            const card = document.getElementById(cardId);
            try { await fetch(API, { method: 'POST', body: JSON.stringify({ azione: "SET_MEZZO", idRichiesta: id, mezzo: val }) }); card.classList.add('save-flash'); setTimeout(() => card.classList.remove('save-flash'), 1000); } catch (e) { alert("Errore!"); }
        }
        async function addPersona() {
            const r = document.getElementById('add-ruolo').value, n = document.getElementById('add-nome').value.trim().toUpperCase(), e = document.getElementById('add-email').value.trim(), c = document.getElementById('add-cat').value;
            if(!n) return alert("Inserire nome!");
            await fetch(API, { method: 'POST', body: JSON.stringify({ azione: "ADD_PERSONA", ruolo: r, nome: n, email: e, cat: c }) }); location.reload();
        }
        async function addMezzo() {
            const t = document.getElementById('add-targa').value.toUpperCase(); if(!t) return;
            await fetch(API, { method: 'POST', body: JSON.stringify({ azione: "ADD_VEICOLO", targa: t }) }); location.reload();
        }
        async function delPersona(n) { if(confirm("Eliminare profilo?")) { await fetch(API, { method: 'POST', body: JSON.stringify({ azione: "DEL_PERSONA", nome: n }) }); init(); } }
        async function delGuida(id) { if(confirm("Cancellare guida?")) { await fetch(API, { method: 'POST', body: JSON.stringify({ azione: "DEL_GUIDA", id: id }) }); init(); } }
        
        function switchTab(t) { 
            ['guide','registro','staff','mezzi'].forEach(s => { 
                document.getElementById('sec-'+s).classList.toggle('hidden', s !== t); 
                document.getElementById('t-'+s).classList.toggle('tab-active', s === t); 
            }); 
        }
        
        function filterStatus(s) { 
            currentFilter = s; 
            document.getElementById('f-aperta').classList.toggle('filter-active', s === 'APERTA');
            document.getElementById('f-assegnata').classList.toggle('filter-active', s === 'ASSEGNATA');
            renderAll(); 
        }
        window.onload = init;
    </script>
</body>
</html>
