<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRI Admin Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .tab-active { border-bottom: 4px solid #ed1c24; color: #ed1c24; font-weight: 900; }
        .hidden { display: none; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="pb-20">
    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b p-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-4"><img src="logo.png" class="w-14 h-auto" onerror="this.style.display='none'"><div><h1 class="text-xl font-black uppercase leading-none">Pannello <span class="text-red-600">Admin</span></h1></div></div>
        <div class="flex gap-2">
            <button onclick="generaRecapWA()" class="bg-green-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-2 shadow-lg hover:bg-green-700 transition"><i class="fab fa-whatsapp"></i> Recap WA</button>
            <button onclick="init()" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-500"><i id="sync-icon" class="fas fa-sync-alt"></i></button>
        </div>
    </header>

    <nav class="bg-white border-b px-4 mb-6 flex gap-8">
        <button onclick="switchTab('guide')" id="t-guide" class="py-4 text-xs uppercase tracking-widest tab-active">Guide</button>
        <button onclick="switchTab('staff')" id="t-staff" class="py-4 text-xs uppercase tracking-widest text-slate-400 font-bold">Anagrafica</button>
    </nav>

    <main class="p-4 max-w-4xl mx-auto">
        <div id="sec-guide" class="space-y-6">
            <div class="flex gap-2 p-1 bg-slate-200 rounded-2xl w-fit mx-auto sm:mx-0">
                <button onclick="filterStatus('APERTA')" id="f-aperta" class="px-6 py-2 rounded-xl text-[10px] font-black uppercase transition bg-white shadow-sm">In Attesa</button>
                <button onclick="filterStatus('ASSEGNATA')" id="f-assegnata" class="px-6 py-2 rounded-xl text-[10px] font-black uppercase transition text-slate-500">Confermate</button>
            </div>
            <div id="lista-guide" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div id="sec-staff" class="hidden space-y-6">
            <div class="card p-6 border-l-8 border-red-600">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
                    <select id="add-ruolo" class="p-3 bg-slate-50 rounded-xl font-bold border-none shadow-inner"><option value="DISCENTE">DISCENTE</option><option value="TRAINER">TRAINER</option><option value="RESPONSABILE">RESPONSABILE</option></select>
                    <input type="text" id="add-nome" placeholder="COGNOME NOME" class="p-3 bg-slate-50 rounded-xl font-bold uppercase shadow-inner">
                    <input type="email" id="add-email" placeholder="EMAIL" class="p-3 bg-slate-50 rounded-xl font-bold shadow-inner">
                    <button onclick="addPersona()" class="bg-red-600 text-white font-black py-3 rounded-xl uppercase text-xs">Aggiungi</button>
                </div>
            </div>
            <div class="card overflow-hidden"><table class="w-full text-left text-xs"><tbody id="lista-staff" class="divide-y divide-slate-100"></tbody></table></div>
        </div>
    </main>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbx-uPuEAgD1T1FpXFCz7wGdWULbhu12Z6Fwi47GUm-IjwOrl7aljcBLmHyQkP8vpe7M/exec";
        let db = { anagrafica: [], richieste: [] };
        let currentFilter = 'APERTA';

        async function init() {
            document.getElementById('sync-icon').classList.add('fa-spin');
            try {
                const r = await fetch(API); const d = await r.json();
                db.anagrafica = d.anagrafica || []; db.richieste = d.richieste || [];
                renderGuide(); renderStaff();
            } catch (e) { alert("Errore connessione."); }
            document.getElementById('sync-icon').classList.remove('fa-spin');
        }

        function fixD(s) { 
            if(!s || s === "Data") return "";
            let p = s.split('T')[0].split(/[-/]/);
            let y = p[0].length === 4 ? p[0] : p[2], m = p[1], d = p[0].length === 4 ? p[2] : p[0];
            return `${d}-${m}-${y}`;
        }

        function generaRecapWA() {
            const conf = db.richieste.filter(r => r[4] === 'ASSEGNATA' && r[0] !== "ID");
            if (conf.length === 0) return alert("Nessuna guida confermata.");
            conf.sort((a,b) => new Date(a[1]) - new Date(b[1]));
            let m = "🚗 *RIEPILOGO GUIDE CONFERMATE*\n";
            let ud = "";
            conf.forEach(r => {
                const df = fixD(r[1]);
                if (df !== ud) { m += `\n📅 *${df}*\n`; ud = df; }
                m += `• Ore ${r[2]}: _${r[3]}_ con *${r[5]}* ${r[6] ? '['+r[6]+']' : ''}\n`;
            });
            window.open(`https://wa.me/?text=${encodeURIComponent(m)}`, '_blank');
        }

        function renderGuide() {
            const container = document.getElementById('lista-guide');
            const filtered = db.richieste.filter(r => r[4] === currentFilter && r[0] !== "ID" && r[3]);
            container.innerHTML = filtered.map(r => `
                <div class="card p-5 space-y-4">
                    <div class="flex justify-between items-start">
                        <div><p class="text-[12px] font-black text-red-600 uppercase">${fixD(r[1])}</p><h4 class="font-black text-slate-800 uppercase text-lg leading-tight tracking-tighter">${r[3]}</h4><p class="text-xs font-bold text-slate-400 mt-1">Ore: ${r[2]}</p></div>
                        <button onclick="delGuida('${r[0]}')" class="text-slate-300 hover:text-red-600 transition p-2"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="pt-3 border-t flex items-center gap-2">
                        <input id="targa-${r[0]}" type="text" value="${r[6] || ''}" placeholder="Targa..." class="flex-1 text-xs font-black uppercase py-2 px-3 bg-slate-50 rounded-lg outline-none">
                        <button onclick="salvaTarga('${r[0]}')" class="w-10 h-10 bg-slate-900 text-white rounded-lg flex items-center justify-center hover:bg-green-600 shadow-md"><i class="fas fa-save"></i></button>
                    </div>
                    ${r[5] ? `<p class="text-[10px] font-black text-green-600 uppercase italic">Trainer: ${r[5]}</p>` : ''}
                </div>`).reverse().join('');
        }

        async function salvaTarga(id) {
            const val = document.getElementById('targa-'+id).value.toUpperCase();
            await fetch(API, { method: 'POST', body: JSON.stringify({ azione: "SET_MEZZO", idRichiesta: id, mezzo: val }) });
            alert("Salvato!");
        }

        async function delGuida(id) {
            if(confirm("Cancellare?")) { await fetch(API, { method: 'POST', body: JSON.stringify({ azione: "DEL_GUIDA", id: id }) }); init(); }
        }

        function renderStaff() {
            const container = document.getElementById('lista-staff');
            container.innerHTML = db.anagrafica.filter(a => a[0] && a[1]).map(a => `<tr class="hover:bg-slate-50 font-bold border-b"><td class="p-4 uppercase text-[9px] ${a[0] === 'TRAINER' ? 'text-green-600' : 'text-blue-600'}">${a[0]}</td><td class="p-4 uppercase text-xs">${a[1]}</td><td class="p-4 text-center"><button onclick="delPersona('${a[1]}')" class="text-red-300 transition"><i class="fas fa-user-minus"></i></button></td></tr>`).join('');
        }

        async function addPersona() {
            const r = document.getElementById('add-ruolo').value, n = document.getElementById('add-nome').value.trim().toUpperCase(), e = document.getElementById('add-email').value.trim();
            if(!n) return alert("Manca il nome!");
            await fetch(API, { method: 'POST', body: JSON.stringify({ azione: "ADD_PERSONA", ruolo: r, nome: n, email: e, cat: "" }) }); location.reload();
        }

        async function delPersona(n) { if(confirm("Rimuovere?")) { await fetch(API, { method: 'POST', body: JSON.stringify({ azione: "DEL_PERSONA", nome: n }) }); init(); } }
        function switchTab(t) { document.getElementById('sec-guide').classList.toggle('hidden', t !== 'guide'); document.getElementById('sec-staff').classList.toggle('hidden', t !== 'staff'); document.getElementById('t-guide').classList.toggle('tab-active', t === 'guide'); document.getElementById('t-staff').classList.toggle('tab-active', t === 'staff'); }
        function filterStatus(s) { currentFilter = s; document.getElementById('f-aperta').classList.toggle('bg-white', s === 'APERTA'); document.getElementById('f-assegnata').classList.toggle('bg-white', s === 'ASSEGNATA'); renderGuide(); }
        window.onload = init;
    </script>
</body>
</html>
