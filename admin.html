<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRI Admin Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f1f5f9; }
        .tab-active { border-bottom: 4px solid #ed1c24; color: #ed1c24; font-weight: 900; }
        .hidden { display: none; }
    </style>
</head>
<body class="pb-20">
    <header class="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-50">
        <h1 class="font-black uppercase text-red-600">Admin Pro</h1>
        <div class="flex gap-2">
            <button onclick="esportaCSV()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase"><i class="fas fa-file-export"></i> CSV</button>
            <button onclick="init()" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center"><i id="sync" class="fas fa-sync"></i></button>
        </div>
    </header>

    <nav class="bg-white border-b px-4 mb-6 flex gap-4 overflow-x-auto no-scrollbar">
        <button onclick="switchTab('guide')" id="t-guide" class="py-4 text-[10px] uppercase font-bold tab-active">Guide</button>
        <button onclick="switchTab('archivio')" id="t-archivio" class="py-4 text-[10px] uppercase font-bold text-slate-400">Archivio</button>
        <button onclick="switchTab('staff')" id="t-staff" class="py-4 text-[10px] uppercase font-bold text-slate-400">Staff</button>
        <button onclick="switchTab('mezzi')" id="t-mezzi" class="py-4 text-[10px] uppercase font-bold text-slate-400">Mezzi</button>
    </nav>

    <main class="p-4 max-w-4xl mx-auto">
        <div id="sec-guide" class="space-y-4">
            <div id="lista-guide" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div id="sec-archivio" class="hidden space-y-4">
            <h3 class="text-center font-black uppercase text-xs text-slate-400">Storico Guide Effettuate</h3>
            <div id="lista-archivio" class="space-y-2"></div>
        </div>

        <div id="sec-staff" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-3xl border">
                <div class="grid grid-cols-1 gap-3 sm:grid-cols-5">
                    <select id="add-ruolo" class="p-3 bg-slate-50 rounded-xl font-bold border-none shadow-inner"><option value="DISCENTE">DISCENTE</option><option value="TRAINER">TRAINER</option></select>
                    <input type="text" id="add-nome" placeholder="Nome Cognome" class="p-3 bg-slate-50 rounded-xl font-bold shadow-inner">
                    <input type="email" id="add-email" placeholder="Email" class="p-3 bg-slate-50 rounded-xl font-bold shadow-inner">
                    <select id="add-cat" class="p-3 bg-slate-50 rounded-xl font-bold border-none shadow-inner"><option value="4">CAT. 4</option><option value="5">CAT. 5</option></select>
                    <button onclick="addPersona()" class="bg-red-600 text-white font-black py-3 rounded-xl uppercase text-xs">Aggiungi</button>
                </div>
            </div>
            <div id="lista-staff" class="bg-white rounded-3xl overflow-hidden shadow-sm"></div>
        </div>

        <div id="sec-mezzi" class="hidden space-y-4 text-center">
            <div class="bg-white p-6 rounded-3xl border flex gap-3">
                <input type="text" id="add-targa" placeholder="Targa (es. CRI 1234)" class="flex-1 p-3 bg-slate-50 rounded-xl font-bold shadow-inner uppercase">
                <button onclick="addMezzo()" class="bg-slate-900 text-white font-black px-6 py-3 rounded-xl uppercase text-xs">Salva</button>
            </div>
            <div id="lista-mezzi" class="flex flex-wrap gap-2 justify-center"></div>
        </div>
    </main>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzYeHgRqZk3hcb7A1yqBlb8mBZVNgtDupl0KDzX7LFXsjM-JuevQPnUtye74kM9ZtJU/exec";
        let db = {};

        async function init() {
            document.getElementById('sync').classList.add('fa-spin');
            try {
                const r = await fetch(API); db = await r.json();
                renderAll();
            } catch (e) { alert("Errore."); }
            document.getElementById('sync').classList.remove('fa-spin');
        }

        function parseD(s) { let p = s.split('T')[0].split(/[-/]/); return new Date(p[0].length===4?p[0]:p[2], p[1]-1, p[0].length===4?p[2]:p[0], 12, 0, 0); }
        function fixD(s) { let d = parseD(s); return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`; }

        function renderAll() {
            const oggi = new Date(); oggi.setHours(0,0,0,0);
            
            // Guide Future
            const guide = db.richieste.filter(r => r[4] === 'ASSEGNATA' && parseD(r[1]) >= oggi).sort((a,b) => parseD(a[1]) - parseD(b[1]));
            document.getElementById('lista-guide').innerHTML = guide.map(r => `
                <div class="bg-white p-5 rounded-3xl border-l-4 border-green-500 shadow-sm flex justify-between items-center">
                    <div><p class="text-[10px] font-black text-red-600">${fixD(r[1])}</p><h4 class="font-black uppercase text-sm">${r[3]}</h4><p class="text-xs font-bold text-slate-400">Ore: ${r[2]}</p></div>
                    <select onchange="salvaTarga('${r[0]}', this.value)" class="p-2 bg-slate-50 border rounded-xl text-[10px] font-bold">
                        <option value="">Mezzo...</option>
                        ${db.veicoli.map(v => `<option value="${v[0]}" ${r[6]===v[0]?'selected':''}>${v[0]}</option>`).join('')}
                    </select>
                </div>`).join('');

            // Archivio
            const arch = db.richieste.filter(r => r[4] === 'ASSEGNATA' && parseD(r[1]) < oggi).sort((a,b) => parseD(b[1]) - parseD(a[1]));
            document.getElementById('lista-archivio').innerHTML = arch.map(r => `<div class="bg-slate-50 p-3 rounded-xl flex justify-between text-[10px] font-bold"><span>${fixD(r[1])}</span><span>${r[3]}</span><span class="text-slate-400">${r[5]}</span></div>`).join('');

            // Mezzi
            document.getElementById('lista-mezzi').innerHTML = db.veicoli.map(v => `<span class="bg-white border px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-sm">${v[0]}</span>`).join('');
            
            // Staff
            document.getElementById('lista-staff').innerHTML = db.anagrafica.map(a => `<div class="flex justify-between p-4 border-b font-bold text-xs"><span>${a[1]} (${a[0]})</span><button onclick="delPersona('${a[1]}')" class="text-red-500"><i class="fas fa-trash"></i></button></div>`).join('');
        }

        async function addMezzo() {
            const t = document.getElementById('add-targa').value.toUpperCase(); if(!t) return;
            await fetch(API, { method: 'POST', body: JSON.stringify({ azione: "ADD_VEICOLO", targa: t }) });
            location.reload();
        }

        async function salvaTarga(id, val) {
            await fetch(API, { method: 'POST', body: JSON.stringify({ azione: "SET_MEZZO", idRichiesta: id, mezzo: val }) });
        }

        function esportaCSV() {
            let csv = "ID,Data,Orario,Allievo,Stato,Istruttore,Mezzo\n";
            db.richieste.forEach(r => { csv += r.join(",") + "\n"; });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'Recap_Guide_CRI.csv');
            a.click();
        }

        function switchTab(t) {
            ['guide','archivio','staff','mezzi'].forEach(s => {
                document.getElementById('sec-'+s).classList.toggle('hidden', s !== t);
                document.getElementById('t-'+s).classList.toggle('text-slate-400', s !== t);
                document.getElementById('t-'+s).classList.toggle('tab-active', s === t);
            });
        }
        
        async function addPersona() {
            const r = document.getElementById('add-ruolo').value, n = document.getElementById('add-nome').value.trim().toUpperCase(), e = document.getElementById('add-email').value.trim(), c = document.getElementById('add-cat').value;
            await fetch(API, { method: 'POST', body: JSON.stringify({ azione: "ADD_PERSONA", ruolo: r, nome: n, email: e, cat: c }) }); location.reload();
        }
        async function delPersona(n) { if(confirm("Elimina?")) { await fetch(API, { method: 'POST', body: JSON.stringify({ azione: "DEL_PERSONA", nome: n }) }); init(); } }

        window.onload = init;
    </script>
</body>
</html>
