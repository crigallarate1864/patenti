<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRI Gallarate - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f1f5f9; }
        .cri-red { background-color: #ed1c24; }
    </style>
</head>
<body class="p-4">

    <header class="max-w-5xl mx-auto mb-8 flex justify-between items-center bg-white p-5 rounded-3xl shadow-lg border-b-4 border-red-600">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="CRI" onerror="this.style.display='none'; document.getElementById('fb-logo-a').classList.remove('hidden')" class="h-10 w-auto">
            <div id="fb-logo-a" class="hidden w-10 h-10 cri-red rounded-lg flex items-center justify-center text-white font-black text-xs">CRI</div>
            <div class="leading-none">
                <h1 class="text-xl font-black uppercase text-slate-800">Supervisione <span class="text-red-600">Patenti</span></h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest italic leading-none mt-1">CRI Gallarate</p>
            </div>
        </div>
        <button onclick="location.reload()" class="bg-slate-100 p-3 rounded-full text-slate-500 hover:text-red-600 transition shadow-sm"><i class="fas fa-sync-alt"></i></button>
    </header>

    <main class="max-w-5xl mx-auto bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
        <div class="overflow-x-auto">
            <table class="w-full text-left text-xs font-bold">
                <thead class="bg-slate-900 text-slate-400 uppercase tracking-widest">
                    <tr>
                        <th class="p-4">Data/Ora</th>
                        <th class="p-4">Discente</th>
                        <th class="p-4">Trainer</th>
                        <th class="p-4">Mezzo Assegnato</th>
                    </tr>
                </thead>
                <tbody id="admin-table" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </main>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbyStmx0Dsh9Vu0b0TOgfkfVM90KZsoiltA7h63gswDLK0rYCJMyDviVvcK2IAWWNIqB/exec";

        async function load() {
            const r = await fetch(API);
            const db = await r.json();
            
            document.getElementById('admin-table').innerHTML = db.richieste.map(r => `
                <tr class="hover:bg-slate-50 transition border-b">
                    <td class="p-4 text-slate-800">${pulisciData(r[1])}<br><span class="text-red-600 font-black">${r[2]}</span></td>
                    <td class="p-4 uppercase text-slate-900 font-black">${r[3]}</td>
                    <td class="p-4 uppercase ${r[5] ? 'text-green-600 font-black' : 'text-slate-300'}">${r[5] || 'In attesa'}</td>
                    <td class="p-4">
                        <input id="m-${r[0]}" value="${r[6] || ''}" onchange="setMezzo('${r[0]}')" 
                               placeholder="Inserisci Targa..." 
                               class="w-full border-2 border-slate-100 p-2 rounded-xl uppercase font-black outline-none focus:border-red-500 transition shadow-inner bg-slate-50">
                    </td>
                </tr>
            `).reverse().join('');
        }

        async function setMezzo(id) {
            const val = document.getElementById('m-'+id).value;
            const res = await fetch(API, { method: 'POST', body: JSON.stringify({ azione: "SET_MEZZO", idRichiesta: id, mezzo: val.toUpperCase() }) });
            console.log("Stato salvataggio mezzo: " + await res.text());
        }

        function pulisciData(d) { if(typeof d === 'string' && d.includes('T')) { let p = d.split('T')[0].split('-'); return p[2]+'/'+p[1]+'/'+p[0]; } return d; }
        window.onload = load;
    </script>
</body>
</html>
