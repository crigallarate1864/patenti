<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRI Trainer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .accordion-content { max-height: 0; overflow: hidden; transition: all 0.4s ease-out; opacity: 0; }
        .accordion-content.open { max-height: 2000px; opacity: 1; padding-bottom: 1.5rem; }
        .rotate-icon { transition: transform 0.3s ease; }
        .rotate-icon.open { transform: rotate(180deg); }
    </style>
</head>
<body class="pb-20">
    <header class="bg-white p-4 shadow-sm border-b sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-4"><img src="logo.png" class="w-16 h-auto" onerror="this.style.display='none'"><div><h1 class="text-xl font-black uppercase tracking-tight">Area <span class="text-green-600">Trainer</span></h1></div></div>
        <div id="loader" class="hidden animate-spin text-green-600 text-xl"><i class="fas fa-circle-notch"></i></div>
    </header>

    <main class="p-4 max-w-xl mx-auto space-y-6 mt-4">
        <div id="db-trainer" class="hidden grid grid-cols-1 gap-3">
            <div class="bg-slate-900 text-white p-5 rounded-3xl flex justify-between items-center shadow-xl">
                <div><p class="text-[10px] font-bold uppercase opacity-60">Il tuo punteggio guide</p><p id="t-stat-tot" class="text-4xl font-black italic">0</p></div>
                <i class="fas fa-award text-3xl text-yellow-400"></i>
            </div>
            <div id="next-guida-box" class="hidden bg-white p-4 rounded-3xl border-2 border-green-500 shadow-lg">
                <p class="text-[9px] font-black text-green-600 uppercase mb-1 tracking-widest"><i class="fas fa-star mr-1"></i> Prossimo Appuntamento</p>
                <div id="next-guida-content"></div>
            </div>
        </div>

        <div class="bg-white p-5 rounded-[2rem] shadow-xl border border-white">
            <label class="text-[10px] font-black uppercase text-slate-400 ml-2 mb-2 block tracking-widest italic">Chi sta operando?</label>
            <select id="ist-nome" onchange="updateView()" class="w-full p-4 bg-slate-50 rounded-2xl font-extrabold border-none outline-none text-slate-700 shadow-inner"></select>
        </div>

        <div class="space-y-4">
            <div class="flex items-center justify-between px-2">
                <h3 class="text-xs font-black text-slate-400 uppercase italic">Proposte Disponibili</h3>
                <span id="count-proposte" class="bg-green-100 text-green-700 text-[10px] font-black px-2 py-0.5 rounded-full">0</span>
            </div>
            <div id="lista-proposte" class="space-y-4"></div>
        </div>

        <div id="miei-impegni" class="space-y-3 pt-6 border-t border-slate-200"></div>
    </main>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbx-uPuEAgD1T1FpXFCz7wGdWULbhu12Z6Fwi47GUm-IjwOrl7aljcBLmHyQkP8vpe7M/exec";
        let db = { anagrafica: [], richieste: [] };

        async function init() {
            document.getElementById('loader').classList.remove('hidden');
            try {
                const r = await fetch(API); db = await r.json();
                const trainers = db.anagrafica.filter(x => x[0] === 'TRAINER');
                document.getElementById('ist-nome').innerHTML = '<option value="">-- Seleziona Nome --</option>' + trainers.map(t => `<option value="${t[1]}">${t[1]}</option>`).join('');
                renderProposte(); updateView();
            } catch (e) {}
            document.getElementById('loader').classList.add('hidden');
        }

        function parseD(s) { 
            if(!s || s === "Data") return new Date(2099,1,1);
            let p = s.split('T')[0].split(/[-/]/);
            return new Date(p[0].length===4?p[0]:p[2], p[1]-1, p[0].length===4?p[2]:p[0], 12, 0, 0); 
        }

        function fixD(s) { 
            const d = parseD(s);
            return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
        }

        function renderProposte() {
            const container = document.getElementById('lista-proposte');
            const aperte = db.richieste.filter(r => r[4] === 'APERTA');
            document.getElementById('count-proposte').innerText = aperte.length;
            
            const grouped = aperte.reduce((acc, r) => { (acc[r[3]] = acc[r[3]] || []).push(r); return acc; }, {});
            let html = ""; let idx = 0;
            
            for (const allievo in grouped) {
                idx++;
                html += `<div class="bg-white rounded-[2.5rem] shadow-xl border border-white overflow-hidden">
                    <div onclick="toggleAccordion('acc-${idx}')" class="p-6 flex justify-between items-center cursor-pointer hover:bg-slate-50 transition-colors">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-green-50 text-green-600 rounded-2xl flex items-center justify-center shadow-inner"><i class="fas fa-user-graduate"></i></div>
                            <h4 class="text-lg font-black uppercase text-slate-800 tracking-tighter">${allievo}</h4>
                        </div>
                        <i id="icon-acc-${idx}" class="fas fa-chevron-down text-slate-300 rotate-icon"></i>
                    </div>
                    <div id="acc-${idx}" class="accordion-content px-6"><div class="space-y-4 pt-2">`;
                
                // ORDINA DATE ALL'INTERNO DELL'ACCORDION
                const dateGroup = grouped[allievo].sort((a,b) => parseD(a[1]) - parseD(b[1]));
                dateGroup.forEach(s => {
                    html += `<div class="flex justify-between items-center bg-slate-50 p-3 rounded-2xl">
                        <p class="text-[11px] font-black uppercase"><span class="text-red-600">${fixD(s[1])}</span><br><span class="text-slate-500">Ore ${s[2]}</span></p>
                        <button onclick="accetta('${s[0]}','${allievo}','${s[1]}','${s[2]}')" class="bg-slate-900 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase active:scale-95 transition">Accetta</button>
                    </div>`;
                });
                html += `</div></div></div>`;
            }
            container.innerHTML = html || '<p class="text-center text-slate-400 py-10 uppercase font-black text-xs">Nessuna proposta attiva</p>';
        }

        function updateView() {
            const ist = document.getElementById('ist-nome').value; if(!ist) return;
            document.getElementById('db-trainer').classList.remove('hidden');
            // MIEI IMPEGNI ORDINATI PER DATA
            const miei = db.richieste.filter(r => r[5] === ist && r[4] === 'ASSEGNATA').sort((a,b) => parseD(a[1]) - parseD(b[1]));
            document.getElementById('t-stat-tot').innerText = miei.length;
            
            const oggi = new Date(); oggi.setHours(0,0,0,0);
            const future = miei.filter(r => parseD(r[1]) >= oggi);
            
            if(future.length > 0) {
                document.getElementById('next-guida-box').classList.remove('hidden');
                document.getElementById('next-guida-content').innerHTML = `<p class="font-black text-slate-800 text-sm uppercase leading-tight">${fixD(future[0][1])} - ORE ${future[0][2]}</p><p class="text-xs font-bold text-slate-500 uppercase">${future[0][3]}</p>`;
            } else { document.getElementById('next-guida-box').classList.add('hidden'); }
            
            document.getElementById('miei-impegni').innerHTML = miei.map(r => `<div class="bg-white p-5 rounded-[2rem] shadow-md border flex justify-between items-center"><div><p class="uppercase text-red-600 text-[10px] font-black mb-1"><i class="far fa-calendar-check mr-1"></i> ${fixD(r[1])}</p><p class="uppercase text-slate-800 font-black text-xs">ORE ${r[2]} — ${r[3]}</p></div><p class="text-red-600 font-black text-[10px] uppercase bg-red-50 px-2 py-1 rounded-lg">${r[6] || '---'}</p></div>`).reverse().join('');
        }

        async function accetta(id, allievo, data, ora) {
            const ist = document.getElementById('ist-nome').value; if(!ist) return alert("Seleziona chi sei!");
            const info = db.anagrafica.find(x => x[1] === allievo);
            const max = (info && info[3] === "5") ? 6 : 4;
            if (db.richieste.filter(r => r[3] === allievo && r[4] === 'ASSEGNATA').length >= max) return alert("L'allievo ha raggiunto il limite patente!");
            if (db.richieste.filter(r => r[5] === ist && r[3] === allievo && r[4] === 'ASSEGNATA').length >= 2) return alert("Hai già fatto 2 guide con questo allievo!");
            if(!confirm(`Confermi la guida del ${fixD(data)}?`)) return;
            document.getElementById('loader').classList.remove('hidden');
            await fetch(API, { method: 'POST', body: JSON.stringify({ azione: "ACCETTA", idRichiesta: id, allievo: allievo, istruttore: ist, dataGuida: data, oraGuida: ora }) });
            location.reload();
        }
        function toggleAccordion(id) { document.getElementById(id).classList.toggle('open'); document.getElementById('icon-' + id).classList.toggle('open'); }
        window.onload = init;
    </script>
</body>
</html>
