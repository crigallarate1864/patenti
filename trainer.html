<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRI Gallarate - Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .cri-red { background-color: #ed1c24; }
        .hidden { display: none; }
        /* Animazione per i pulsanti orari */
        .slot-btn:active { scale: 0.95; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center border-b-2 border-slate-100">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="CRI" onerror="this.style.display='none'; document.getElementById('fb-logo-t').classList.remove('hidden')" class="h-10 w-auto">
            <div id="fb-logo-t" class="hidden w-10 h-10 bg-green-600 rounded-lg flex items-center justify-center text-white font-black text-xs shadow-inner">CRI</div>
            <div class="leading-none">
                <h1 class="text-lg font-black uppercase tracking-tighter text-slate-800">Area <span class="text-green-600">Trainer</span></h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">CRI Gallarate</p>
            </div>
        </div>
        <div id="loading" class="hidden animate-spin text-green-600"><i class="fas fa-spinner"></i></div>
    </header>

    <main class="p-4 max-w-xl mx-auto space-y-8">
        <div class="bg-white p-4 rounded-3xl shadow-md border border-slate-100">
            <label class="text-[10px] font-black uppercase text-slate-400 ml-2 mb-1 block tracking-widest">Seleziona il tuo nome</label>
            <select id="ist-nome" onchange="updateView()" class="w-full p-3 bg-slate-50 rounded-xl font-black border-none outline-none shadow-inner"></select>
        </div>

        <section class="space-y-4">
            <h3 class="text-[10px] font-black text-green-600 uppercase tracking-widest ml-2 italic text-center text-slate-400">Proposte Disponibili (per Allievo)</h3>
            <div id="lista-proposte" class="space-y-6"></div>
        </section>

        <section class="space-y-4">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 italic text-center">I Miei Impegni Confermati</h3>
            <div id="miei-impegni" class="space-y-3"></div>
        </section>
    </main>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbyStmx0Dsh9Vu0b0TOgfkfVM90KZsoiltA7h63gswDLK0rYCJMyDviVvcK2IAWWNIqB/exec";
        let db = { anagrafica: [], richieste: [] };

        async function load() {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const r = await fetch(API);
                db = await r.json();
                
                // Popola Select
                document.getElementById('ist-nome').innerHTML = '<option value="">-- Chi sei? --</option>' + 
                    db.anagrafica.filter(x => x[0] === 'TRAINER').map(x => `<option value="${x[1]}">${x[1]}</option>`).join('');
                
                renderProposte();
                updateView();
            } catch(e) { console.error(e); }
            document.getElementById('loading').classList.add('hidden');
        }

        function renderProposte() {
            const container = document.getElementById('lista-proposte');
            const aperte = db.richieste.filter(r => r[4] === 'APERTA');

            if (aperte.length === 0) {
                container.innerHTML = '<p class="text-center py-10 text-slate-300 font-bold uppercase text-[10px]">Nessuna proposta attiva</p>';
                return;
            }

            // 1. Raggruppa per Allievo
            const grouped = aperte.reduce((acc, r) => {
                const allievo = r[3];
                const data = r[1];
                if (!acc[allievo]) acc[allievo] = {};
                if (!acc[allievo][data]) acc[allievo][data] = [];
                acc[allievo][data].push(r);
                return acc;
            }, {});

            // 2. Genera HTML
            let html = "";
            for (const allievo in grouped) {
                html += `
                <div class="bg-white rounded-[2rem] shadow-lg border-l-8 border-green-500 overflow-hidden">
                    <div class="p-5 border-b border-slate-50 bg-slate-50/50">
                        <h4 class="text-lg font-black uppercase text-slate-800 tracking-tighter leading-none">${allievo}</h4>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Disponibilità inoltrate:</p>
                    </div>
                    <div class="p-5 space-y-4">`;

                for (const data in grouped[allievo]) {
                    html += `
                        <div>
                            <p class="text-[11px] font-black text-red-600 uppercase mb-2"><i class="far fa-calendar-alt mr-1"></i> ${formattazioneEstesa(data)}</p>
                            <div class="flex flex-wrap gap-2">
                                ${grouped[allievo][data].map(slot => `
                                    <button onclick="accetta('${slot[0]}','${allievo}','${slot[1]}','${slot[2]}')" 
                                            class="slot-btn bg-slate-900 text-white px-4 py-2 rounded-xl font-black text-[11px] flex items-center gap-2 shadow-sm transition">
                                        <i class="far fa-clock opacity-50"></i> ${slot[2]}
                                    </button>
                                `).join('')}
                            </div>
                        </div>`;
                }

                html += `</div></div>`;
            }
            container.innerHTML = html;
        }

        function updateView() {
            const nome = document.getElementById('ist-nome').value;
            if(!nome) return;
            const miei = db.richieste.filter(r => r[5] === nome && r[4] === 'ASSEGNATA');
            const containerComm = document.getElementById('miei-impegni');
            
            containerComm.innerHTML = miei.length === 0 ? '<p class="text-center py-4 text-slate-300 font-bold uppercase text-[10px]">Nessun impegno confermato</p>' :
                miei.map(r => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-slate-900 flex justify-between items-center text-[11px] font-bold">
                    <div class="flex gap-3 items-center text-left">
                         <button onclick="scaricaICS('${pulisciData(r[1])}','${r[2]}','Guida con ${r[3]}','Mezzo: ${r[6]||'Vedi portale'}')" class="text-slate-500 bg-slate-50 w-8 h-8 rounded-lg flex items-center justify-center shadow-sm hover:text-green-600"><i class="fas fa-calendar-plus text-lg"></i></button>
                         <div>
                            <p class="uppercase text-red-600 text-[10px] leading-none mb-1 font-black">${formattazioneEstesa(r[1])}</p>
                            <p class="uppercase text-slate-800 font-black text-xs">ORE ${r[2]} - ALLIEVO: ${r[3]}</p>
                         </div>
                    </div>
                    <p class="text-red-600 font-black tracking-tighter">${r[6] || '---'}</p>
                </div>
            `).reverse().join('');
        }

        function formattazioneEstesa(dataStr) {
            if(!dataStr) return "";
            let dataObj;
            if(dataStr.includes('T')) dataObj = new Date(dataStr.split('T')[0]);
            else if(dataStr.includes('-')) dataObj = new Date(dataStr);
            else if(dataStr.includes('/')) { let p = dataStr.split('/'); dataObj = new Date(p[2], p[1]-1, p[0]); }
            return dataObj.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase();
        }

        function scaricaICS(dataStr, oraStr, titolo, desc) {
            const [g, m, a] = dataStr.split('/');
            const [ore, min] = oraStr.split(':');
            const inizio = new Date(a, m - 1, g, ore, min);
            const fine = new Date(inizio.getTime() + 75 * 60000); 
            const formatICS = (d) => d.toISOString().replace(/-|:|\.\d+/g, '');
            const icsMSG = ["BEGIN:VCALENDAR","VERSION:2.0","BEGIN:VEVENT","DTSTART:"+formatICS(inizio),"DTEND:"+formatICS(fine),"SUMMARY:"+titolo,"DESCRIPTION:"+desc,"LOCATION:CRI Gallarate","END:VEVENT","END:VCALENDAR"].join("\n");
            const blob = new Blob([icsMSG], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.setAttribute('download', 'impegno_guida.ics');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function accetta(id, allievo, data, ora) {
            const trainer = document.getElementById('ist-nome').value;
            if(!trainer) return alert("Per favore, seleziona prima il tuo nome nel selettore in alto!");
            if(!confirm(`Confermi di accettare la guida di ${allievo} il giorno ${pulisciData(data)} alle ore ${ora}?`)) return;
            
            document.getElementById('loading').classList.remove('hidden');
            try {
                const res = await fetch(API, { method: 'POST', body: JSON.stringify({ azione: "ACCETTA", idRichiesta: id, allievo: allievo, istruttore: trainer, dataGuida: data, oraGuida: ora }) });
                const msg = await res.text();
                alert(msg);
                load();
            } catch(e) { alert("Errore durante l'accettazione"); }
            document.getElementById('loading').classList.add('hidden');
        }

        function pulisciData(d) { if(typeof d === 'string' && d.includes('T')) { let p = d.split('T')[0].split('-'); return p[2]+'/'+p[1]+'/'+p[0]; } return d; }
        window.onload = load;
    </script>
</body>
</html>
