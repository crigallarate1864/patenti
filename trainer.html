<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRI Trainer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .accordion-content { max-height: 0; overflow: hidden; transition: all 0.4s ease-out; opacity: 0; }
        .accordion-content.open { max-height: 2000px; opacity: 1; padding-bottom: 1.5rem; }
        .rotate-icon { transition: transform 0.3s ease; }
        .rotate-icon.open { transform: rotate(180deg); }
    </style>
</head>
<body class="pb-20">
    <header class="bg-white p-4 shadow-sm border-b sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-4"><img src="logo.png" alt="CRI" class="w-16 h-auto" onerror="this.style.display='none'"><div><h1 class="text-xl font-black uppercase tracking-tight">Area <span class="text-green-600">Trainer</span></h1></div></div>
        <div id="loader" class="hidden animate-spin text-green-600 text-xl"><i class="fas fa-circle-notch"></i></div>
    </header>

    <main class="p-4 max-w-xl mx-auto space-y-6">
        <div id="db-trainer" class="hidden bg-slate-900 text-white p-4 rounded-3xl flex justify-between items-center shadow-xl">
            <div><p class="text-[10px] font-bold uppercase opacity-60">Guide Confermate</p><p id="t-stat-tot" class="text-3xl font-black">0</p></div>
            <i class="fas fa-clipboard-check text-2xl text-green-400"></i>
        </div>

        <div class="bg-white p-5 rounded-[2rem] shadow-xl border border-white">
            <select id="ist-nome" onchange="updateView()" class="w-full p-4 bg-slate-50 rounded-2xl font-extrabold border-none outline-none text-slate-700 shadow-inner"></select>
        </div>

        <div id="lista-proposte" class="space-y-4"></div>
        <div id="miei-impegni" class="space-y-3 pt-4 border-t"></div>
    </main>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbx-uPuEAgD1T1FpXFCz7wGdWULbhu12Z6Fwi47GUm-IjwOrl7aljcBLmHyQkP8vpe7M/exec";
        let db = { anagrafica: [], richieste: [] };

        async function init() {
            document.getElementById('loader').classList.remove('hidden');
            try {
                const r = await fetch(API); db = await r.json();
                const tr = db.anagrafica.filter(x => x[0] === 'TRAINER');
                document.getElementById('ist-nome').innerHTML = '<option value="">-- Chi sei? --</option>' + tr.map(t => `<option value="${t[1]}">${t[1]}</option>`).join('');
                renderProposte(); updateView();
            } catch (e) {}
            document.getElementById('loader').classList.add('hidden');
        }

        function fixD(s) { 
            if(!s || s === "Data") return "";
            let p = s.split('T')[0].split(/[-/]/);
            let y = p[0].length === 4 ? p[0] : p[2], m = p[1], d = p[0].length === 4 ? p[2] : p[0];
            return `${d}-${m}-${y}`;
        }

        function renderProposte() {
            const container = document.getElementById('lista-proposte');
            const aperte = db.richieste.filter(r => r[4] === 'APERTA');
            const grouped = aperte.reduce((acc, r) => { (acc[r[3]] = acc[r[3]] || []).push(r); return acc; }, {});
            let h = ""; let idx = 0;
            for (const allievo in grouped) {
                idx++;
                h += `<div class="bg-white rounded-[2.5rem] shadow-xl border border-white overflow-hidden">
                    <div onclick="toggleAccordion('acc-${idx}')" class="p-6 flex justify-between items-center cursor-pointer hover:bg-slate-50">
                        <div class="flex items-center gap-4"><div class="w-12 h-12 bg-green-50 text-green-600 rounded-2xl flex items-center justify-center font-black">${grouped[allievo].length}</div><h4 class="text-lg font-black uppercase text-slate-800">${allievo}</h4></div>
                        <i id="icon-acc-${idx}" class="fas fa-chevron-down text-slate-300 rotate-icon"></i>
                    </div>
                    <div id="acc-${idx}" class="accordion-content px-6"><div class="space-y-4 pt-2">`;
                const dateGroup = grouped[allievo].reduce((acc, r) => { (acc[r[1]] = acc[r[1]] || []).push(r); return acc; }, {});
                for (const d in dateGroup) {
                    h += `<div><p class="text-[11px] font-black text-red-600 mb-2">${fixD(d)}</p><div class="grid grid-cols-2 gap-2">${dateGroup[d].map(s => `<button onclick="accetta('${s[0]}','${allievo}','${s[1]}','${s[2]}')" class="bg-white border-2 border-slate-100 p-3 rounded-2xl font-black text-xs hover:border-green-500">${s[2]}</button>`).join('')}</div></div>`;
                }
                h += `</div></div></div>`;
            }
            container.innerHTML = h || '<p class="text-center text-slate-400 py-10 uppercase font-black text-xs tracking-widest">Nessuna proposta</p>';
        }

        function updateView() {
            const ist = document.getElementById('ist-nome').value; if(!ist) return;
            document.getElementById('db-trainer').classList.remove('hidden');
            const miei = db.richieste.filter(r => r[5] === ist && r[4] === 'ASSEGNATA');
            document.getElementById('t-stat-tot').innerText = miei.length;
            document.getElementById('miei-impegni').innerHTML = miei.map(r => `<div class="bg-white p-5 rounded-[2rem] shadow-md border flex justify-between items-center"><div><p class="uppercase text-red-600 text-[10px] font-black mb-1">${fixD(r[1])}</p><p class="uppercase text-slate-800 font-black text-xs">ORE ${r[2]} — ${r[3]}</p></div><p class="text-red-600 font-black text-xs uppercase">${r[6] || '---'}</p></div>`).reverse().join('');
        }

        async function accetta(id, allievo, data, ora) {
            const ist = document.getElementById('ist-nome').value; if(!ist) return alert("Chi sei?");
            const info = db.anagrafica.find(x => x[1] === allievo);
            const max = (info && info[3] === "5") ? 6 : 4;
            if (db.richieste.filter(r => r[3] === allievo && r[4] === 'ASSEGNATA').length >= max) return alert("Limite patente raggiunto!");
            if (db.richieste.filter(r => r[5] === ist && r[3] === allievo && r[4] === 'ASSEGNATA').length >= 2) return alert("Limite coppia raggiunto!");
            if(!confirm(`Confermi guida con ${allievo}?`)) return;
            document.getElementById('loader').classList.remove('hidden');
            await fetch(API, { method: 'POST', body: JSON.stringify({ azione: "ACCETTA", idRichiesta: id, allievo: allievo, istruttore: ist, dataGuida: data, oraGuida: ora }) });
            location.reload();
        }
        function toggleAccordion(id) { document.getElementById(id).classList.toggle('open'); document.getElementById('icon-' + id).classList.toggle('open'); }
        window.onload = init;
    </script>
</body>
</html>
