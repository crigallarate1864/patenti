<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRI Gallarate - Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .accordion-content.open { max-height: 1000px; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center border-b-2 border-slate-100">
        <div class="flex items-center gap-3"><img src="logo.png" alt="CRI" class="h-10"><h1 class="text-lg font-black uppercase text-slate-800">Area <span class="text-green-600">Trainer</span></h1></div>
        <div id="loading" class="hidden animate-spin text-green-600"><i class="fas fa-spinner"></i></div>
    </header>

    <main class="p-4 max-w-xl mx-auto space-y-6">
        <div id="error-box" class="hidden p-4 bg-red-600 text-white rounded-xl text-xs font-bold"></div>
        
        <select id="ist-nome" onchange="updateView()" class="w-full p-4 bg-white rounded-2xl shadow-md font-black border-none outline-none"></select>
        
        <div id="lista-proposte" class="space-y-4"></div>

        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center italic">I Miei Impegni</h3>
        <div id="miei-impegni" class="space-y-3"></div>
    </main>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzisixq5H1LEQnvl77PV5QIBbmPSDRNEWLS4ZM2AiD7j6L5wRnZXSeac9oyAcTARjbD/exec";
        let db = { anagrafica: [], richieste: [] };

        async function load() {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const r = await fetch(API);
                db = await r.json();
                if(!db.anagrafica) throw new Error("Dati corrotti");
                
                document.getElementById('ist-nome').innerHTML = '<option value="">-- Chi sei? --</option>' + 
                    db.anagrafica.filter(x => x[0] && x[0].toUpperCase() === 'TRAINER').map(x => `<option value="${x[1]}">${x[1]}</option>`).join('');
                
                renderProposte();
                updateView();
            } catch(e) {
                document.getElementById('error-box').innerText = "ERRORE: " + e.message;
                document.getElementById('error-box').classList.remove('hidden');
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function fixData(s) {
            if(!s || s === "Data") return "";
            let p = s.split('T')[0].split(/[-/]/); 
            let y, m, d;
            if (p[0].length === 4) { y = p[0]; m = p[1]; d = p[2]; } else { d = p[0]; m = p[1]; y = p[2]; }
            const dateObj = new Date(y, m - 1, d, 12, 0);
            return dateObj.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }).toUpperCase();
        }

        function renderProposte() {
            const container = document.getElementById('lista-proposte');
            if(!db.richieste) return;
            const aperte = db.richieste.filter(r => r[4] === 'APERTA');
            const grouped = aperte.reduce((acc, r) => { (acc[r[3]] = acc[r[3]] || []).push(r); return acc; }, {});

            let h = ""; Object.keys(grouped).forEach((allievo, i) => {
                h += `<div class="bg-white rounded-[2rem] shadow-lg border border-slate-100 overflow-hidden">
                    <div onclick="document.getElementById('acc-${i}').classList.toggle('open')" class="p-5 flex justify-between items-center cursor-pointer hover:bg-slate-50">
                        <div class="flex items-center gap-3"><div class="w-8 h-8 bg-green-50 text-green-600 rounded-full flex items-center justify-center font-black text-xs">${grouped[allievo].length}</div><h4 class="font-black uppercase text-slate-800">${allievo}</h4></div>
                        <i class="fas fa-chevron-down text-slate-300"></i>
                    </div>
                    <div id="acc-${i}" class="accordion-content bg-slate-50/30 p-5 space-y-4">`;
                grouped[allievo].forEach(r => {
                    h += `<div class="flex justify-between items-center border-b pb-2 border-slate-200">
                        <p class="text-[10px] font-bold uppercase text-red-600">${fixData(r[1])}<br><span class="text-slate-800">ORE ${r[2]}</span></p>
                        <button onclick="accetta('${r[0]}','${allievo}','${r[1]}','${r[2]}')" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase">Accetta</button>
                    </div>`;
                });
                h += `</div></div>`;
            });
            container.innerHTML = h || '<p class="text-center py-10 text-slate-300 font-black uppercase text-xs">Nessuna proposta</p>';
        }

        function updateView() {
            const n = document.getElementById('ist-nome').value; if(!n || !db.richieste) return;
            const miei = db.richieste.filter(r => r[5] === n && r[4] === 'ASSEGNATA');
            document.getElementById('miei-impegni').innerHTML = miei.map(r => `
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-slate-900 flex justify-between items-center">
                    <p class="text-[10px] font-bold uppercase">${fixData(r[1])} - ${r[2]}<br>${r[3]}</p>
                    <p class="text-red-600 font-black text-xs">${r[6] || '---'}</p>
                </div>`).reverse().join('');
        }

        async function accetta(id, a, d, o) {
            const ist = document.getElementById('ist-nome').value; if(!ist) return alert("Scegli il tuo nome!");
            if(!confirm("Accetti questa guida?")) return;
            document.getElementById('loading').classList.remove('hidden');
            await fetch(API, { method: 'POST', body: JSON.stringify({ azione: "ACCETTA", idRichiesta: id, allievo: a, istruttore: ist, dataGuida: d, oraGuida: o }) });
            location.reload();
        }
        window.onload = load;
    </script>
</body>
</html>
