<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRI Gallarate - Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .cri-red { background-color: #ed1c24; }
        .hidden { display: none; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center border-b-2 border-slate-100">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="CRI" onerror="this.style.display='none'; document.getElementById('fb-logo-t').classList.remove('hidden')" class="h-10 w-auto">
            <div id="fb-logo-t" class="hidden w-10 h-10 bg-green-600 rounded-lg flex items-center justify-center text-white font-black text-xs">CRI</div>
            <div class="leading-none">
                <h1 class="text-lg font-black uppercase tracking-tighter text-slate-800">Area <span class="text-green-600">Trainer</span></h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">CRI Gallarate</p>
            </div>
        </div>
        <div id="loading" class="hidden animate-spin text-green-600"><i class="fas fa-spinner"></i></div>
    </header>

    <main class="p-4 max-w-xl mx-auto space-y-8">
        <div class="bg-white p-4 rounded-3xl shadow-md border border-slate-100">
            <label class="text-[10px] font-black uppercase text-slate-400 ml-2 mb-1 block tracking-widest">Seleziona il tuo nome</label>
            <select id="ist-nome" onchange="updateView()" class="w-full p-3 bg-slate-50 rounded-xl font-black border-none outline-none"></select>
        </div>

        <section class="space-y-4">
            <h3 class="text-[10px] font-black text-green-600 uppercase tracking-widest ml-2 italic">Proposte da Accettare</h3>
            <div id="lista-proposte" class="space-y-4"></div>
        </section>

        <section class="space-y-4">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 italic">I Miei Impegni</h3>
            <div id="miei-impegni" class="space-y-3"></div>
        </section>
    </main>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbw34wKdqEayDmCctsmq1yMmiTPJrdD012i0z3JU-iwOJP_RyfN1RQn7ZHsrdwITFEDO/exec";
        let db = { anagrafica: [], richieste: [] };

        async function load() {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const r = await fetch(API);
                db = await r.json();
                document.getElementById('ist-nome').innerHTML = '<option value="">-- Chi sei? --</option>' + 
                    db.anagrafica.filter(x => x[0] === 'TRAINER').map(x => `<option value="${x[1]}">${x[1]}</option>`).join('');
                
                const aperte = db.richieste.filter(r => r[4] === 'APERTA');
                document.getElementById('lista-proposte').innerHTML = aperte.length === 0 ? '<p class="text-center py-10 text-slate-300 font-bold uppercase text-[10px]">Nessuna proposta attiva</p>' : 
                    aperte.map(r => `
                        <div class="bg-white p-5 rounded-[2rem] shadow-lg border-l-8 border-green-500 flex justify-between items-center transition active:scale-95">
                            <div>
                                <p class="text-[9px] font-black text-slate-400 uppercase">${pulisciData(r[1])}</p>
                                <h4 class="text-md font-black uppercase text-slate-800 tracking-tighter">${r[3]}</h4>
                                <p class="text-xl font-black text-green-600 leading-none">${r[2]}</p>
                            </div>
                            <button onclick="accetta('${r[0]}','${r[3]}','${r[1]}','${r[2]}')" class="bg-slate-900 text-white px-5 py-3 rounded-2xl font-black text-[10px] uppercase italic shadow-md">Accetta</button>
                        </div>
                    `).join('');
                updateView();
            } catch(e) { console.error(e); }
            document.getElementById('loading').classList.add('hidden');
        }

        function updateView() {
            const nome = document.getElementById('ist-nome').value;
            if(!nome) return;
            const miei = db.richieste.filter(r => r[5] === nome && r[4] === 'ASSEGNATA');
            document.getElementById('miei-impegni').innerHTML = miei.map(r => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-slate-900 flex justify-between items-center text-[11px] font-bold">
                    <div class="flex gap-3 items-center">
                         <button onclick="scaricaICS('${pulisciData(r[1])}','${r[2]}','Guida con ${r[3]}','Mezzo: ${r[6]||'Controlla portale'}')" class="text-slate-500 bg-slate-50 w-8 h-8 rounded-lg flex items-center justify-center shadow-sm"><i class="fas fa-calendar-plus text-lg"></i></button>
                         <div>
                            <p class="uppercase text-slate-400">${pulisciData(r[1])} - ${r[2]}</p>
                            <p class="uppercase text-slate-800 font-black">${r[3]}</p>
                         </div>
                    </div>
                    <p class="text-red-600 font-black">${r[6] || '---'}</p>
                </div>
            `).reverse().join('');
        }

        function scaricaICS(dataStr, oraStr, titolo, desc) {
            const [g, m, a] = dataStr.split('/');
            const [ore, min] = oraStr.split(':');
            const inizio = new Date(a, m - 1, g, ore, min);
            const fine = new Date(inizio.getTime() + 75 * 60000); 
            const formatICS = (d) => d.toISOString().replace(/-|:|\.\d+/g, '');
            const icsMSG = ["BEGIN:VCALENDAR","VERSION:2.0","BEGIN:VEVENT","DTSTART:"+formatICS(inizio),"DTEND:"+formatICS(fine),"SUMMARY:"+titolo,"DESCRIPTION:"+desc,"LOCATION:CRI Gallarate","END:VEVENT","END:VCALENDAR"].join("\n");
            const blob = new Blob([icsMSG], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.setAttribute('download', 'impegno_guida.ics');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function accetta(id, allievo, data, ora) {
            const trainer = document.getElementById('ist-nome').value;
            if(!trainer) return alert("Seleziona prima il tuo nome!");
            if(!confirm(`Vuoi accettare la guida di ${allievo}?`)) return;
            document.getElementById('loading').classList.remove('hidden');
            try {
                const res = await fetch(API, { method: 'POST', body: JSON.stringify({ azione: "ACCETTA", idRichiesta: id, allievo: allievo, istruttore: trainer, dataGuida: data, oraGuida: ora }) });
                alert(await res.text());
                load();
            } catch(e) { alert("Errore accetazione"); }
            document.getElementById('loading').classList.add('hidden');
        }

        function pulisciData(d) { if(typeof d === 'string' && d.includes('T')) { let p = d.split('T')[0].split('-'); return p[2]+'/'+p[1]+'/'+p[0]; } return d; }
        window.onload = load;
    </script>
</body>
</html>
