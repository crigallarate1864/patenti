<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>CRI Gallarate - Gestione Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">

    <nav class="bg-red-800 text-white p-4 font-bold flex justify-between shadow-lg">
        <span>CRI GALLARATE - PORTALE GUIDE</span>
        <div class="space-x-4 text-sm">
            <button onclick="view('responsabile')" class="opacity-70 hover:opacity-100">Responsabile</button>
            <button onclick="view('trainer')" class="opacity-70 hover:opacity-100">Istruttori</button>
            <button onclick="view('studente')" class="opacity-70 hover:opacity-100">Allievi</button>
        </div>
    </nav>

    <section id="trainer" class="p-6 hidden">
        <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow border-t-4 border-red-600">
            <h2 class="text-xl font-black mb-4 uppercase">Pubblica Disponibilità</h2>
            <div class="grid grid-cols-2 gap-4">
                <input id="t-nome" placeholder="Tuo Nome" class="border p-2 rounded">
                <input id="t-email" placeholder="Tua Email" class="border p-2 rounded">
                <input id="t-data" type="date" class="border p-2 rounded">
                <div class="flex gap-2">
                    <input id="t-da" type="time" class="border p-2 rounded w-full">
                    <input id="t-a" type="time" class="border p-2 rounded w-full">
                </div>
                <button onclick="creaSessione()" class="col-span-2 bg-red-600 text-white font-bold py-3 rounded">CREA SLOT DA 75 MINUTI</button>
            </div>
        </div>
    </section>

    <section id="studente" class="p-6 hidden">
        <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow border-t-4 border-blue-600">
            <h2 class="text-xl font-black mb-4 uppercase">Prenota Guida</h2>
            <div class="flex gap-4 mb-6">
                <input id="s-nome" placeholder="Tuo Nome e Cognome" class="border p-2 flex-1 rounded">
                <select id="s-cat" class="border p-2 rounded">
                    <option value="4">Patente 4 (4 guide)</option>
                    <option value="5">Patente 5 (6 guide)</option>
                </select>
            </div>
            <div id="lista-slot" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <p class="text-gray-400 italic">Caricamento slot disponibili...</p>
            </div>
        </div>
    </section>

    <section id="responsabile" class="p-6">
        <div class="max-w-5xl mx-auto bg-white p-6 rounded-xl shadow border-t-4 border-gray-800">
            <h2 class="text-xl font-black mb-4 uppercase">Gestione Mezzi e Planning</h2>
            <table class="w-full text-left text-sm">
                <thead>
                    <tr class="bg-gray-100 uppercase text-[10px]">
                        <th class="p-2">Data/Ora</th>
                        <th class="p-2">Trainer</th>
                        <th class="p-2">Discente</th>
                        <th class="p-2">Mezzo (Targa CRI)</th>
                        <th class="p-2">Azione</th>
                    </tr>
                </thead>
                <tbody id="tabella-responsabile">
                    </tbody>
            </table>
        </div>
    </section>

    <script>
        function view(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function creaSessione() {
            const data = {
                azione: "CREA_SESSIONE",
                trainer: document.getElementById('t-nome').value,
                email: document.getElementById('t-email').value,
                giorno: document.getElementById('t-data').value,
                oraInizio: document.getElementById('t-da').value,
                oraFine: document.getElementById('t-a').value
            };
            // Invio a Google Apps Script
            alert("Richiesta inviata! Il sistema genererà slot da 75 minuti.");
        }
    </script>
</body>
</html>
