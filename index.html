<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRI Gallarate - Allievi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .cri-red { background-color: #ed1c24; }
        input, select { font-size: 16px !important; }
        label { font-weight: 800; text-transform: uppercase; font-size: 0.65rem; color: #64748b; margin-bottom: 0.2rem; display: block; margin-left: 0.5rem; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center border-b-2 border-slate-100">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="CRI" onerror="this.style.display='none'; document.getElementById('fb-logo').classList.remove('hidden')" class="h-10 w-auto">
            <div id="fb-logo" class="hidden w-10 h-10 cri-red rounded-lg flex items-center justify-center text-white font-black text-xs">CRI</div>
            <div class="leading-none">
                <h1 class="text-lg font-black uppercase tracking-tighter text-slate-800">Area <span class="text-blue-600">Allievi</span></h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">CRI Gallarate</p>
            </div>
        </div>
        <div id="loading" class="hidden animate-spin text-blue-600"><i class="fas fa-spinner"></i></div>
    </header>

    <main class="p-4 max-w-xl mx-auto space-y-8">
        <section class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100">
            <h2 class="text-xl font-black mb-6 uppercase italic text-slate-800 text-center">Inoltra Disponibilità</h2>
            <div class="space-y-4">
                <div>
                    <label>Chi sei?</label>
                    <select id="all-nome" onchange="updateView()" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-50 font-bold outline-none focus:border-blue-500"></select>
                </div>
                <div>
                    <label>Giorno della Guida</label>
                    <input type="date" id="all-data" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-50 font-bold outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label>Dalle ore</label><input type="time" id="all-inizio" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-50 font-bold text-center"></div>
                    <div><label>Alle ore</label><input type="time" id="all-fine" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-50 font-bold text-center"></div>
                </div>
                <div id="stat-box" class="hidden p-4 bg-blue-50 rounded-2xl text-blue-700 text-center font-black uppercase text-[10px] tracking-widest italic border border-blue-100"></div>
                <button onclick="inoltra()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase shadow-lg shadow-blue-100 active:scale-95 transition">Inoltra Proposta</button>
            </div>
        </section>

        <section class="space-y-4">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 italic text-center">Le Mie Richieste</h3>
            <div id="mie-guide" class="space-y-3"></div>
        </section>
    </main>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbybqU7YZeCfA7m5N0gdsjP32qdm2oAHDOGaxQgKCuE1GZKgME00pAmtJLnAyGQgWEbs/exec";
        let db = { anagrafica: [], richieste: [] };

        async function load() {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const r = await fetch(API);
                db = await r.json();
                document.getElementById('all-nome').innerHTML = '<option value="">-- Seleziona Nome --</option>' + 
                    db.anagrafica.filter(x => x[0] === 'DISCENTE').map(x => `<option value="${x[1]}">${x[1]}</option>`).join('');
                updateView();
            } catch(e) { console.error(e); }
            document.getElementById('loading').classList.add('hidden');
        }

        function formattazioneEstesa(dataStr) {
            if(!dataStr) return "";
            let d;
            if(dataStr.includes('T')) d = new Date(dataStr.split('T')[0]);
            else if(dataStr.includes('-')) d = new Date(dataStr);
            else if(dataStr.includes('/')) { let p = dataStr.split('/'); d = new Date(p[2], p[1]-1, p[0]); }
            return d.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }).toUpperCase();
        }

        function updateView() {
            const nome = document.getElementById('all-nome').value;
            if(!nome) return;
            const mie = db.richieste.filter(r => r[3] === nome && (r[4]==='ASSEGNATA' || r[4]==='APERTA'));
            const container = document.getElementById('mie-guide');
            
            container.innerHTML = mie.length === 0 ? '<p class="text-center py-4 text-slate-300 font-bold uppercase text-[10px]">Nessuna richiesta</p>' : 
                mie.map(r => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
                    <div class="flex gap-3 items-center">
                        ${r[4]==='ASSEGNATA' ? `<button onclick="scaricaICS('${pulisciData(r[1])}','${r[2]}','Guida CRI','Istruttore: ${r[5]}')" class="text-blue-500 bg-blue-50 w-10 h-10 rounded-xl flex items-center justify-center shadow-sm"><i class="fas fa-calendar-plus text-xl"></i></button>` : `<div class="text-slate-300 bg-slate-50 w-10 h-10 rounded-xl flex items-center justify-center"><i class="fas fa-clock text-xl"></i></div>`}
                        <div>
                            <p class="text-[12px] font-black text-red-600 mb-0.5">${formattazioneEstesa(r[1])}</p>
                            <p class="font-bold uppercase text-[11px] text-slate-800 tracking-tighter">ORE ${r[2]} - ${r[4]==='ASSEGNATA' ? 'ISTRUTTORE: ' + r[5] : 'IN ATTESA'}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="px-2 py-1 rounded-full text-[8px] font-black uppercase ${r[4]==='ASSEGNATA'?'bg-green-100 text-green-700':'bg-orange-100 text-orange-700'}">${r[4]==='ASSEGNATA'?'Confermata':'In Attesa'}</span>
                        <p class="text-[10px] font-black text-slate-400 mt-1 uppercase">${r[6] || ''}</p>
                    </div>
                </div>
            `).reverse().join('');
            
            const p = db.anagrafica.find(x => x[1] === nome);
            const f = db.richieste.filter(r => r[3] === nome && r[4] === 'ASSEGNATA').length;
            const box = document.getElementById('stat-box');
            box.classList.remove('hidden');
            box.innerText = `Percorso: ${f} guide su ${p[3]==='5'?'6':'4'}`;
        }

        function scaricaICS(dataStr, oraRange, titolo, desc) {
            const [g, m, a] = dataStr.split('/');
            const oraInizio = oraRange.split(' - ')[0];
            const oraFine = oraRange.split(' - ')[1];
            const [oreI, minI] = oraInizio.split(':');
            const [oreF, minF] = oraFine.split(':');
            const dStart = new Date(a, m - 1, g, oreI, minI);
            const dEnd = new Date(a, m - 1, g, oreF, minF);
            const formatICS = (d) => d.toISOString().replace(/-|:|\.\d+/g, '');
            const icsMSG = ["BEGIN:VCALENDAR","VERSION:2.0","BEGIN:VEVENT","DTSTART:"+formatICS(dStart),"DTEND:"+formatICS(dEnd),"SUMMARY:"+titolo,"DESCRIPTION:"+desc,"LOCATION:CRI Gallarate","END:VEVENT","END:VCALENDAR"].join("\n");
            const blob = new Blob([icsMSG], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.setAttribute('download', 'guida.ics');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function inoltra() {
            const d = { azione: "INOLTRA", allievo: document.getElementById('all-nome').value, giorno: document.getElementById('all-data').value, oraInizio: document.getElementById('all-inizio').value, oraFine: document.getElementById('all-fine').value };
            if(!d.allievo || !d.giorno || !d.oraInizio) return alert("Mancano dati!");
            document.getElementById('loading').classList.remove('hidden');
            try {
                const res = await fetch(API, { method: 'POST', body: JSON.stringify(d) });
                alert(await res.text());
                load();
            } catch(e) { alert("Errore invio"); }
            document.getElementById('loading').classList.add('hidden');
        }

        function pulisciData(d) { if(typeof d === 'string' && d.includes('T')) { let p = d.split('T')[0].split('-'); return p[2]+'/'+p[1]+'/'+p[0]; } return d; }
        window.onload = load;
    </script>
</body>
</html>
