<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f1f5f9; }
        .cri-red { background-color: #ed1c24; }
        .hidden { display: none; }
        .nav-active { color: #ed1c24; border-top: 3px solid #ed1c24; }
    </style>
</head>
<body class="pb-24 text-slate-800">

    <header class="bg-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 cri-red rounded-lg flex items-center justify-center text-white font-black text-xs">CRI</div>
            <h1 class="text-lg font-black uppercase tracking-tighter">Patenti <span class="text-red-600">Gallarate</span></h1>
        </div>
        <div id="loading" class="hidden animate-bounce text-red-600 font-bold text-xs">CARICAMENTO...</div>
    </header>

    <main class="p-4 max-w-xl mx-auto">

        <div id="area-allievo" class="tab-content space-y-6">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100">
                <h2 class="text-2xl font-black mb-4">Inoltra Disponibilità</h2>
                <div class="space-y-4">
                    <select id="all-nome" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-red-500 font-bold"></select>
                    <input type="date" id="all-data" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="time" id="all-inizio" class="p-4 bg-slate-50 rounded-2xl border-none font-bold text-center">
                        <input type="time" id="all-fine" class="p-4 bg-slate-50 rounded-2xl border-none font-bold text-center">
                    </div>
                    <button onclick="inoltra()" class="w-full cri-red text-white py-5 rounded-2xl font-black uppercase shadow-lg shadow-red-100">Invia Proposta</button>
                </div>
            </div>
            
            <div class="space-y-3" id="mie-guide">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest ml-2">Le mie guide</h3>
                </div>
        </div>

        <div id="area-istruttore" class="tab-content hidden space-y-6">
            <div id="ist-login" class="bg-white p-8 rounded-[2.5rem] shadow-xl text-center">
                <h2 class="text-xl font-black mb-4">AREA TRAINER</h2>
                <input type="password" id="ist-pass" placeholder="Password" class="w-full p-4 bg-slate-50 rounded-2xl text-center mb-4 outline-none border-none">
                <button onclick="loginIst()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black">ACCEDI</button>
            </div>
            <div id="ist-content" class="hidden space-y-4">
                <select id="ist-nome" class="w-full p-4 bg-white rounded-2xl shadow-md font-black border-none outline-none"></select>
                <h3 class="text-xs font-black text-green-600 uppercase tracking-widest ml-2">Richieste da Accettare</h3>
                <div id="lista-richieste" class="space-y-3"></div>
            </div>
        </div>

        <div id="area-responsabile" class="tab-content hidden space-y-6">
            <div id="resp-login" class="bg-white p-8 rounded-[2.5rem] shadow-xl text-center">
                <h2 class="text-xl font-black mb-4 uppercase text-red-600">Admin Panel</h2>
                <input type="password" id="resp-pass" placeholder="Password" class="w-full p-4 bg-slate-50 rounded-2xl text-center mb-4 outline-none border-none">
                <button onclick="loginResp()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black">ACCEDI ADMIN</button>
            </div>
            <div id="resp-content" class="hidden">
                <div class="bg-white p-4 rounded-3xl shadow-lg overflow-x-auto">
                    <table class="w-full text-left text-[10px] font-bold">
                        <thead class="border-b uppercase text-slate-400"><tr><th class="p-2">Data</th><th class="p-2">Allievo</th><th class="p-2">Istruttore</th><th class="p-2">Mezzo</th></tr></thead>
                        <tbody id="resp-tab" class="divide-y"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around p-3 z-50">
        <button onclick="nav('allievo')" id="nav-allievo" class="flex flex-col items-center gap-1 nav-active">
            <span class="text-[10px] font-black uppercase">Allievi</span>
        </button>
        <button onclick="nav('istruttore')" id="nav-istruttore" class="flex flex-col items-center gap-1 text-slate-400">
            <span class="text-[10px] font-black uppercase">Trainer</span>
        </button>
        <button onclick="nav('responsabile')" id="nav-responsabile" class="flex flex-col items-center gap-1 text-slate-400">
            <span class="text-[10px] font-black uppercase">Admin</span>
        </button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzb1SHaeD9DGm9_UJYEltjn6ofpScIWC6L2Bna_W3ey0QkZrUqSV-O9WzttezBDXuNt/exec";
        let db = { anagrafica: [], richieste: [] };

        function load() {
            document.getElementById('loading').classList.remove('hidden');
            fetch(API).then(r => r.json()).then(data => {
                db = data;
                render();
                document.getElementById('loading').classList.add('hidden');
            });
        }

        function render() {
            const allievi = db.anagrafica.filter(r => r[0] === 'DISCENTE');
            const trainer = db.anagrafica.filter(r => r[0] === 'TRAINER');

            document.getElementById('all-nome').innerHTML = '<option value="">Seleziona Nome</option>' + allievi.map(r => `<option value="${r[1]}">${r[1]}</option>`);
            document.getElementById('ist-nome').innerHTML = '<option value="">Tuo Nome Trainer</option>' + trainer.map(r => `<option value="${r[1]}">${r[1]}</option>`);
            
            // Render Richieste Aperte
            document.getElementById('lista-richieste').innerHTML = db.richieste.filter(r => r[4] === 'APERTA').map(r => `
                <div class="bg-white p-5 rounded-[2rem] shadow-md border-l-8 border-green-500">
                    <div class="flex justify-between text-[10px] font-black text-slate-400"><span>${pulisciData(r[1])}</span><span>INOLTRATA</span></div>
                    <h4 class="text-lg font-black uppercase mt-1">${r[3]}</h4>
                    <p class="text-2xl font-black text-green-600">${r[2]}</p>
                    <button onclick="accetta('${r[0]}', '${r[3]}', '${r[1]}', '${r[2]}')" class="mt-3 w-full bg-slate-900 text-white py-3 rounded-2xl font-black text-xs uppercase italic">Accetta Guida</button>
                </div>
            `).join('');

            // Render Tabella Admin
            document.getElementById('resp-tab').innerHTML = db.richieste.map(r => `
                <tr class="border-b">
                    <td class="p-2">${pulisciData(r[1])}<br>${r[2]}</td>
                    <td class="p-2 uppercase">${r[3]}</td>
                    <td class="p-2 uppercase text-red-600">${r[5] || '---'}</td>
                    <td class="p-2 font-mono">${r[6] || '---'}</td>
                </tr>
            `).reverse().join('');
        }

        function inoltra() {
            const data = {
                azione: "INOLTRA",
                allievo: document.getElementById('all-nome').value,
                giorno: document.getElementById('all-data').value,
                oraInizio: document.getElementById('all-inizio').value,
                oraFine: document.getElementById('all-fine').value
            };
            if(!data.allievo || !data.giorno) return alert("Mancano dati!");
            send(data);
        }

        function accetta(id, allievo, data, ora) {
            const ist = document.getElementById('ist-nome').value;
            if(!ist) return alert("Seleziona il tuo nome trainer!");
            if(confirm(`Accetti la guida con ${allievo}?`)) {
                send({ azione: "ACCETTA", idRichiesta: id, allievo: allievo, istruttore: ist, dataGuida: data, oraGuida: ora });
            }
        }

        function send(p) {
            document.getElementById('loading').classList.remove('hidden');
            fetch(API, { method: 'POST', body: JSON.stringify(p) })
            .then(r => r.text()).then(t => { alert(t); load(); });
        }

        function nav(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('area-' + tab).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('nav-' + tab).classList.add('nav-active');
        }

        function loginIst() { if(document.getElementById('ist-pass').value === "Guide26!") { document.getElementById('ist-login').classList.add('hidden'); document.getElementById('ist-content').classList.remove('hidden'); } }
        function loginResp() { if(document.getElementById('resp-pass').value === "Pat3nti26!") { document.getElementById('resp-login').classList.add('hidden'); document.getElementById('resp-content').classList.remove('hidden'); } }
        function pulisciData(d) { if(!d) return ""; if(typeof d === 'string' && d.includes('T')) { let p = d.split('T')[0].split('-'); return p[2]+'/'+p[1]+'/'+p[0]; } return d; }

        load();
    </script>
</body>
</html>
