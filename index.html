<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Gestionale Guide CRI Gallarate</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <div id="login-screen" class="fixed inset-0 bg-red-700 flex flex-col items-center justify-center z-[100] text-white">
        <h1 class="text-3xl font-bold mb-8 italic text-center text-white">CRI GALLARATE<br>Portale Formazione Patenti</h1>
        <div class="flex gap-4">
            <button onclick="login('trainer')" class="bg-white text-red-700 px-8 py-4 rounded-xl font-bold shadow-2xl hover:scale-105 transition">ACCESSO TRAINER</button>
            <button onclick="login('student')" class="bg-red-900 text-white px-8 py-4 rounded-xl font-bold shadow-2xl hover:scale-105 border border-red-400">ACCESSO ALLIEVO</button>
        </div>
    </div>

    <section id="area-trainer" class="hidden container mx-auto p-4">
        <div class="bg-white p-6 rounded-xl shadow-lg mb-6 border-t-8 border-red-600">
            <h2 class="text-xl font-bold mb-4 uppercase">Area Istruttori: Offri Disponibilità</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input id="t-nome" type="text" placeholder="Tuo Nome" class="border p-3 rounded">
                <input id="t-email" type="email" placeholder="Tua Email (per notifiche)" class="border p-3 rounded">
                <input id="t-data" type="datetime-local" class="border p-3 rounded">
                <input id="t-mezzo" type="text" placeholder="Mezzo (es. CRI 1234)" class="border p-3 rounded">
                <button onclick="offriSlot()" class="bg-red-600 text-white font-bold rounded shadow hover:bg-red-700">Pubblica Slot</button>
            </div>
        </div>
    </section>

    <section id="area-student" class="hidden container mx-auto p-4">
        <div class="bg-white p-6 rounded-xl shadow-lg border-t-8 border-blue-600">
            <h2 class="text-xl font-bold mb-2 uppercase">Prenota la tua Guida</h2>
            <p class="text-sm text-gray-500 mb-6 italic">Scegli uno slot tra quelli messi a disposizione dai trainer.</p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block font-bold text-gray-700">Il tuo Nome e Cognome</label>
                    <input id="s-nome" type="text" class="w-full border p-3 rounded mb-4" placeholder="Es: Mario Rossi">
                    
                    <label class="block font-bold text-gray-700">Categoria richiesta</label>
                    <select id="s-cat" class="w-full border p-3 rounded mb-4">
                        <option value="4">Patente 4 (Percorso 4 guide)</option>
                        <option value="5">Patente 5 (Percorso 6 guide)</option>
                    </select>
                </div>
                
                <div id="lista-disponibilita" class="space-y-3">
                    <h3 class="font-bold border-b pb-2 text-red-600 uppercase text-sm">Slot Disponibili:</h3>
                    <div class="p-4 bg-gray-50 rounded border italic text-gray-400 text-center">Nessuno slot disponibile al momento.</div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const URL_APP = "IL_TUO_URL_SCRIPT";

        function login(role) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('area-' + role).classList.remove('hidden');
            if(role === 'student') caricaSlot();
        }

        async function offriSlot() {
            const data = {
                azione: "OFFRI_DISPONIBILITA",
                istruttore: document.getElementById('t-nome').value,
                email: document.getElementById('t-email').value,
                dataOra: document.getElementById('t-data').value,
                mezzo: document.getElementById('t-mezzo').value
            };
            await invia(data);
        }

        async function caricaSlot() {
            // Qui andrebbe una fetch GET allo sheet per mostrare gli slot LIBERI
            // Per ora simuliamo la logica di invio
        }

        async function prenota(slotId, istruttore, dataOra) {
            const allievo = document.getElementById('s-nome').value;
            const cat = document.getElementById('s-cat').value;
            if(!allievo) return alert("Inserisci il tuo nome!");

            const data = {
                azione: "PRENOTA_GUIDA",
                slotId: slotId,
                allievo: allievo,
                cat: cat,
                istruttore: istruttore,
                dataOra: dataOra
            };
            
            const res = await invia(data);
            alert("Prenotazione effettuata! Controlla lo stato delle tue guide.");
        }

        async function invia(p) {
            const r = await fetch(URL_APP, { method: 'POST', body: JSON.stringify(p) });
            return r;
        }
    </script>
</body>
</html>
